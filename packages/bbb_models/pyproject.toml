[project]
name = "bbb-models"
version = "0.1.0"
description = "BBB peptide models: tabular/ESM classifiers and geometry EGNN guidance"
readme = "README.md"
requires-python = ">=3.11,<3.13"
dependencies = [
  "bbb-dataset",
  "numpy>=1.26",
  "pandas>=2.2",
  "pyarrow>=15.0",
  "scikit-learn>=1.4",
  "scipy>=1.12",
  "biopython>=1.84",
  "modlamp>=4.3",
  "pyteomics>=4.7",
  "peptides>=0.5",
  "tenacity>=9.0",
  "pyyaml>=6.0",
  "joblib>=1.3",
  "torch>=2.2",
  "fair-esm>=2.0.0",
  "tensorboard>=2.15",
  "mlflow>=2.13",
  "lightgbm>=4.3",
  "matplotlib>=3.8",
  "huggingface_hub>=0.23",
]

[project.scripts]
bbb-classifier = "bbb_classifier.run:main"
bbb-geo = "bbb_geo.run:main"

[project.optional-dependencies]
dev = [
  "pytest>=8.2",
  "ruff>=0.4.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["bbb_classifier*", "bbb_geo*"]

[tool.pytest.ini_options]
pythonpath = ["src"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"
