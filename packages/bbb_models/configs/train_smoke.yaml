run_name: smoke
seed: 42
primary_metric: pr_auc
secondary_metric: mcc
maximize_metric: true

training:
  epochs: 2
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  patience: 2
  log_every: 1
  eval_every: 1
  num_workers: 2

calibration:
  enabled: false
  method: isotonic

output:
  root: artifacts
  save_periodic_every: 0
  keep_top_k: 1

tracking:
  tensorboard: false
  mlflow: false
