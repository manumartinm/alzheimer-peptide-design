dataset_repo: manumartinm/bbb-peptides
dataset_path: data/bbb-peptides/peptides.parquet
dataset_root: data/bbb-peptides
id_col: peptide_id
label_col: bbb_label
sequence_col: sequence
fold_col: fold_id
test_size: 0.2
random_state: 42
tabular_exclude:
  - peptide_id
  - sequence
  - bbb_label
  - split
  - source_split
  - source_db
  - label_tier
  - is_gold
  - cluster_id
  - external_test
  - source_id
  - assay_method
  - reference
  - organism
  - fold_id
  - is_augmented
  - parent_peptide_id
  - sample_weight
  - sequence_hash
  - length
  - has_structure
  - structure_coords_path
  - structure_cif_path
  - plddt
  - ptm
  - structure_confidence
  - iptm
  - complex_iplddt
  - complex_pde
  - complex_ipde
three_d_columns: []
struct_manifest_path: ""
# Geo models resolve coords from structure_coords_path relative to dataset_root.
# Download once: uv run python scripts/data/download.py
