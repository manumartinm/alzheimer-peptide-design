dataset_path: ../dataset/data/processed/peptides_bbb_with_augmentation.parquet
# Sequence augmentation is built in TFG/dataset (tfg-bbb-augment / tfg-bbb-build).
# Use peptides_bbb.parquet for gold-only experiments.
id_col: peptide_id
label_col: bbb_label
sequence_col: sequence
fold_col: fold_id
test_size: 0.2
random_state: 42
tabular_exclude:
  - peptide_id
  - sequence
  - bbb_label
  - split
  - source_split
  - source_db
  - label_tier
  - is_gold
  - cluster_id
  - external_test
  - source_id
  - assay_method
  - reference
  - organism
  - fold_id
  - is_augmented
  - parent_peptide_id
  - sample_weight
three_d_columns: []
struct_manifest_path: ../dataset/data/processed/peptides_struct_manifest.parquet
# Offline dev fallback (no Boltz API): build with
#   cd dataset && uv run python scripts/build_synthetic_struct_manifest.py
# then point manifest_path to peptides_struct_manifest_synthetic.parquet
