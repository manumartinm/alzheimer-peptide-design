[project]
name = "boltzgen-design"
version = "0.1.0"
description = "GSK3beta design orchestration layer for BoltzGen"
readme = "README.md"
requires-python = ">=3.11,<3.13"
dependencies = [
  "pandas>=2.2",
  "pyyaml>=6.0",
  "torch>=2.2",
  "bbb-models",
  "boltzgen",
]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["boltzgen_design*"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"
