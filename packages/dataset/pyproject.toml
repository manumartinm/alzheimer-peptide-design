[project]
name = "bbb-dataset"
version = "0.1.0"
description = "BBB peptide dataset pipeline"
requires-python = ">=3.11,<3.13"
dependencies = [
  "pandas",
  "pyarrow",
  "numpy",
  "scipy",
  "scikit-learn",
  "modlamp",
  "biopython",
  "pyteomics",
  "requests",
  "tqdm",
  "pyyaml",
  "python-dotenv>=1.0",
  "boltz-api>=0.34",
]

[project.scripts]
bbb-dataset-build = "bbb_dataset.cli.build:main"
bbb-dataset-augment = "bbb_dataset.cli.augment:main"
bbb-dataset-fold = "bbb_dataset.cli.fold:main"
bbb-dataset-export-hf = "bbb_dataset.cli.export:main"

[project.optional-dependencies]
notebook = [
  "matplotlib",
  "seaborn",
  "plotly",
  "umap-learn",
  "jupyterlab>=4.0",
  "ipykernel>=6.29",
]
dev = [
  "pytest>=8.2",
  "pytest-cov>=5.0",
  "pytest-mock>=3.14",
]

[dependency-groups]
dev = [
  "pytest>=8.2",
  "pytest-cov>=5.0",
  "pytest-mock>=3.14",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.coverage.run]
source = ["bbb_dataset"]
branch = true
omit = [
  "tests/*",
  "**/bbb_dataset/cli/**",
  "**/bbb_dataset/export_hf.py",
]

[tool.coverage.report]
fail_under = 85
show_missing = true
