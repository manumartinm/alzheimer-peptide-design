[project]
name = "tfg-bbb-dataset"
version = "0.1.0"
description = "BBB peptide dataset pipeline"
requires-python = ">=3.11,<3.13"
dependencies = [
  "pandas",
  "pyarrow",
  "numpy",
  "scipy",
  "scikit-learn",
  "modlamp",
  "biopython",
  "pyteomics",
  "requests",
  "tqdm",
  "pyyaml",
  "matplotlib",
  "seaborn",
  "python-dotenv>=1.0",
  "boltz-api>=0.34",
]

[project.scripts]
tfg-bbb-build = "tfg_bbb.cli.build:main"
tfg-bbb-augment = "tfg_bbb.cli.augment:main"
tfg-bbb-fold = "tfg_bbb.cli.fold:main"
tfg-bbb-export-hf = "tfg_bbb.cli.export:main"

[project.optional-dependencies]
notebook = [
  "plotly",
  "umap-learn",
  "jupyterlab>=4.0",
  "ipykernel>=6.29",
]
dev = [
  "pytest>=8.2",
  "pytest-cov>=5.0",
  "pytest-mock>=3.14",
]

[dependency-groups]
dev = [
  "pytest>=8.2",
  "pytest-cov>=5.0",
  "pytest-mock>=3.14",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.coverage.run]
source = ["tfg_bbb"]
branch = true
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 85
show_missing = true
